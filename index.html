<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>BAIDABOYS27 CHUG WHEEL</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;font-family:Arial Black,Impact,system-ui,sans-serif;background:#03030a;color:#fff}body{display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 50% 20%,#2a0040 0%,#090012 42%,#000 100%)}.brand{position:fixed;top:14px;right:16px;z-index:30;font-size:13px;letter-spacing:3px;color:#00f7ff;text-shadow:0 0 15px #00f7ff}.app{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:14px;gap:10px}.title{margin:0;font-size:clamp(38px,13vw,96px);line-height:.88;letter-spacing:3px;text-align:center;text-shadow:0 0 14px #fff,0 0 35px #ff005d,0 0 65px #00f7ff;animation:pulse .8s infinite alternate}.subtitle{font-size:clamp(12px,3vw,18px);letter-spacing:2px;opacity:.9;text-align:center}.wheelWrap{display:flex;align-items:center;justify-content:center;gap:20px;width:100%;max-width:980px}.wheelBox{position:relative;width:min(64vw,390px);height:min(64vw,390px);min-width:230px;min-height:230px}.wheelBox.small{width:min(47vw,330px);height:min(47vw,330px);min-width:165px;min-height:165px}.pointer{position:absolute;top:50%;z-index:12;width:0;height:0;filter:drop-shadow(0 0 12px #fff)}.leftPointer{left:-20px;transform:translateY(-50%);border-top:22px solid transparent;border-bottom:22px solid transparent;border-left:0;border-right:42px solid #fff}.rightPointer{right:-20px;transform:translateY(-50%);border-top:22px solid transparent;border-bottom:22px solid transparent;border-right:0;border-left:42px solid #fff}canvas{width:100%;height:100%;border-radius:50%;background:#111;border:5px solid rgba(255,255,255,.92);box-shadow:inset 0 0 24px rgba(255,255,255,.3),0 0 38px rgba(255,0,100,.65),0 0 70px rgba(0,247,255,.35)}.wheelLabel{position:absolute;left:0;right:0;bottom:-28px;text-align:center;font-size:12px;letter-spacing:2px;color:#00f7ff;text-shadow:0 0 12px #00f7ff}.start{margin-top:24px;border:3px solid #fff;background:linear-gradient(135deg,#ff005d,#ffb000);color:white;border-radius:999px;padding:15px 26px;font-size:clamp(18px,5vw,34px);font-family:Arial Black,Impact,sans-serif;letter-spacing:2px;box-shadow:0 0 26px #ff005d,0 0 50px #ffb000;cursor:pointer}.countdown{position:fixed;inset:0;z-index:40;display:none;align-items:center;justify-content:center;font-size:clamp(120px,35vw,340px);text-shadow:0 0 25px #fff,0 0 65px #ff005d;background:rgba(0,0,0,.55)}.result{position:fixed;inset:0;z-index:45;display:none;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:18px;background:radial-gradient(circle,#370000 0%,#090014 55%,#000 100%)}.result h2{font-size:clamp(55px,18vw,170px);margin:0;letter-spacing:4px;text-shadow:0 0 18px #fff,0 0 45px #ff005d;animation:slam .45s ease-out both}.names{margin-top:12px;display:flex;flex-direction:column;gap:8px}.winner{font-size:clamp(34px,8vw,88px);line-height:.92;text-transform:uppercase;color:#fff;text-shadow:0 0 15px #00f7ff,0 0 42px #ff005d;animation:pop .45s ease-out both}.and{font-size:clamp(22px,5vw,52px);color:#ffdf00;text-shadow:0 0 18px #ffdf00}.again{margin-top:28px;border:2px solid white;background:rgba(255,255,255,.12);color:white;border-radius:999px;padding:12px 22px;font-size:18px;font-weight:900;letter-spacing:1px}.flash{position:fixed;inset:0;z-index:2;pointer-events:none;mix-blend-mode:screen;opacity:0}.activeFlash{animation:flash .15s infinite alternate}.shake{animation:shake .08s infinite}.confetti{position:fixed;top:-20px;width:10px;height:16px;z-index:60;animation:fall 2.1s linear forwards}@keyframes pulse{from{transform:scale(1)}to{transform:scale(1.045)}}@keyframes flash{from{background:#ff005d;opacity:.5}to{background:#00f7ff;opacity:.25}}@keyframes shake{0%{transform:translate(0,0)}25%{transform:translate(7px,-5px)}50%{transform:translate(-6px,5px)}75%{transform:translate(5px,4px)}100%{transform:translate(-4px,-3px)}}@keyframes slam{0%{transform:scale(3) rotate(-5deg);opacity:0}70%{transform:scale(.9) rotate(2deg);opacity:1}100%{transform:scale(1)}}@keyframes pop{0%{transform:translateY(30px) scale(.5);opacity:0}80%{transform:translateY(-6px) scale(1.08);opacity:1}100%{transform:translateY(0) scale(1)}}@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:.9}}@media(max-width:720px){.wheelWrap{gap:8px}.wheelBox{width:47vw;height:47vw;min-width:155px;min-height:155px}.pointer{transform:translateY(-50%) scale(.78)}.leftPointer{left:-14px}.rightPointer{right:-14px}.start{margin-top:18px}.wheelLabel{bottom:-24px;font-size:10px}}
</style>
</head>
<body>
<div class="brand">BAIDABOYS27</div><div class="flash" id="flash"></div><div class="countdown" id="countdown">3</div>
<div class="app" id="app"><h1 class="title">CHUG WHEEL</h1><div class="subtitle">Trykk start. Etter 3 sekunder velges to personer.</div><div class="wheelWrap"><div class="wheelBox"><div class="pointer leftPointer"></div><canvas id="wheelA"></canvas><div class="wheelLabel">PIL 1</div></div><div class="wheelBox"><div class="pointer rightPointer"></div><canvas id="wheelB"></canvas><div class="wheelLabel">PIL 2</div></div></div><button class="start" id="start">START CHUG</button></div>
<div class="result" id="result"><h2>CHUG!!</h2><div class="names"><div class="winner" id="winner1"></div><div class="and">&</div><div class="winner" id="winner2"></div></div><button class="again" onclick="location.reload()">SPIN AGAIN</button></div>
<audio id="song" src="song.mp4" preload="auto" playsinline></audio>
<script>
const names=["Alexander Nikolai Pedersen","Noah Mimon Jakobsen","Luckas Kuraas Eivik","Andre Hagen Gullbransen","Marius Kvensjø","Phillip Ingvart Akselsen","Fredrik Mikkelsen","Kasper Einås Eidum","Niklas Nilsen","Gabriel Clason","Luca Matheo Edvardsen","Matheo Fakking Mulitmilardær","Bartek Molinski","Mathias Eidisen","Dennis Sandvik","Henrik Ingebritsen","Tobias Harlund","Håvard Baustad","Omar Mballow","Leon Tretvoll","Casper Barosen","Magnus Sommerseth"];
const colors=["#ff005d","#00f7ff","#ffb000","#7cff00","#7b2cff","#ff3d00","#00ff99","#ff00d4"];
const A=document.getElementById('wheelA'),B=document.getElementById('wheelB'),song=document.getElementById('song'),start=document.getElementById('start'),count=document.getElementById('countdown'),result=document.getElementById('result'),app=document.getElementById('app'),flash=document.getElementById('flash');
let rotA=0,rotB=0,spin=false,targetA=0,targetB=0,w1=0,w2=1;
function sizeCanvas(c){const r=c.getBoundingClientRect();const d=Math.round(r.width*devicePixelRatio);c.width=d;c.height=d;drawWheel(c,0)}
function drawWheel(c,rot){const ctx=c.getContext('2d'),n=names.length,w=c.width,h=c.height,cx=w/2,cy=h/2,R=w/2-8,arc=Math.PI*2/n;ctx.clearRect(0,0,w,h);ctx.save();ctx.translate(cx,cy);ctx.rotate(rot);for(let i=0;i<n;i++){ctx.beginPath();ctx.moveTo(0,0);ctx.arc(0,0,R,i*arc,(i+1)*arc);ctx.closePath();ctx.fillStyle=colors[i%colors.length];ctx.fill();ctx.strokeStyle='rgba(255,255,255,.65)';ctx.lineWidth=2*devicePixelRatio;ctx.stroke();ctx.save();ctx.rotate(i*arc+arc/2);ctx.textAlign='right';ctx.fillStyle='#fff';ctx.font=`${Math.max(9,w/34)}px Arial Black`;ctx.shadowColor='#000';ctx.shadowBlur=6;let label=names[i].split(' ')[0];ctx.fillText(label,R-12,4);ctx.restore();}ctx.beginPath();ctx.arc(0,0,R*.17,0,Math.PI*2);ctx.fillStyle='#000';ctx.fill();ctx.strokeStyle='#fff';ctx.lineWidth=4*devicePixelRatio;ctx.stroke();ctx.restore();}
function pick(){w1=Math.floor(Math.random()*names.length);do{w2=Math.floor(Math.random()*names.length)}while(w2===w1);const arc=Math.PI*2/names.length;targetA=angleForWinner(w1,'left');targetB=angleForWinner(w2,'right');}
function angleForWinner(i,side){const arc=Math.PI*2/names.length;const sectorCenter=i*arc+arc/2;const pointerAngle= side==='left' ? Math.PI : 0;let base=pointerAngle-sectorCenter;let turns=(side==='left'?7:8)*Math.PI*2;return base+turns;}
function animate(){const startTime=performance.now(),dur=3000;function frame(now){let t=Math.min(1,(now-startTime)/dur);let ease=1-Math.pow(1-t,4);rotA=targetA*ease;rotB=-targetB*ease;drawWheel(A,rotA);drawWheel(B,rotB);if(t<1)requestAnimationFrame(frame);else finish();}requestAnimationFrame(frame)}
function countdown(){count.style.display='flex';let n=3;count.textContent=n;const iv=setInterval(()=>{n--; if(n>0){count.textContent=n}else{clearInterval(iv);count.style.display='none'}},1000)}
function finish(){document.getElementById('winner1').textContent=names[w1];document.getElementById('winner2').textContent=names[w2];result.style.display='flex';app.style.display='none';flash.classList.add('activeFlash');document.body.classList.add('shake');confetti();navigator.vibrate&&navigator.vibrate([300,100,300,100,500]);setTimeout(()=>document.body.classList.remove('shake'),1200)}
function confetti(){for(let i=0;i<90;i++){let e=document.createElement('div');e.className='confetti';e.style.left=Math.random()*100+'vw';e.style.background=colors[i%colors.length];e.style.animationDelay=(Math.random()*0.6)+'s';document.body.appendChild(e);setTimeout(()=>e.remove(),3000)}}
start.onclick=async()=>{if(spin)return;spin=true;pick();try{song.currentTime=0;await song.play()}catch(e){}countdown();animate()};
window.addEventListener('resize',()=>{sizeCanvas(A);sizeCanvas(B)});sizeCanvas(A);sizeCanvas(B);
</script>
</body>
</html>
